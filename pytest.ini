[pytest]
# Only run tests in the tests/ directory
testpaths = code/tests

# Ignore standalone scripts that have test_ functions but aren't pytest tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Don't search these directories
norecursedirs = .git .venv venv env __pycache__ .pytest_cache results probes docs mlx ollama tools shared skills

# Ignore specific standalone test scripts
ignore_paths = 
    code/probe_endpoint_test.py
    ollama/ollama_cloud_test.py
